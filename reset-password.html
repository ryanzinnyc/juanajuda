<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <title>BiblioTech — Redefinir senha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/styles/styles.css" />
  </head>
  <body>
    <main class="auth">
      <section class="auth__brandside">
        <div class="auth__logo">
          <span class="brand-mark"><i data-lucide="library-big"></i></span> BiblioTech
        </div>
        <div class="auth__pitch">
          <h1>Defina uma <span class="gradient-text">nova senha</span> com segurança.</h1>
          <p>Escolha uma senha forte para proteger o acesso ao painel da biblioteca.</p>
        </div>
        <div class="auth__brandfoot">© 2026 BiblioTech</div>
      </section>

      <section class="auth__formside">
        <div class="auth__card">
          <form id="form-reset" class="auth-view" novalidate>
            <h2>Redefinir senha</h2>
            <p class="sub">Digite e confirme sua nova senha.</p>

            <div class="field">
              <label for="rp-pass">Nova senha</label>
              <div class="input-wrap">
                <i data-lucide="lock"></i>
                <input type="password" id="rp-pass" placeholder="Mínimo 6 caracteres" />
                <button type="button" class="toggle-pass" data-toggle="rp-pass" aria-label="Mostrar senha">
                  <i data-lucide="eye"></i>
                </button>
              </div>
              <small class="field-error">A senha deve ter ao menos 6 caracteres.</small>
            </div>

            <div class="field">
              <label for="rp-pass2">Confirmar nova senha</label>
              <div class="input-wrap">
                <i data-lucide="lock-keyhole"></i>
                <input type="password" id="rp-pass2" placeholder="Repita a senha" />
              </div>
              <small class="field-error">As senhas não coincidem.</small>
            </div>

            <button type="submit" class="btn btn--primary btn--block btn--lg">
              <i data-lucide="check"></i> Salvar nova senha
            </button>
            <p class="auth__switch"><a href="login.html" data-go="login">Voltar ao login</a></p>
          </form>
        </div>
      </section>
    </main>

    <div class="toasts" id="toasts"></div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script type="module">
      import { Auth } from "./src/services/auth.js";
      import { Toast, setBtnLoading, icons } from "./src/js/app.js";

      const $ = (s) => document.querySelector(s);
      icons();

      document.querySelectorAll(".toggle-pass").forEach((btn) =>
        btn.addEventListener("click", () => {
          const input = document.getElementById(btn.dataset.toggle);
          const show = input.type === "password";
          input.type = show ? "text" : "password";
          btn.innerHTML = `<i data-lucide="${show ? "eye-off" : "eye"}"></i>`;
          icons();
        })
      );

      $("#form-reset").addEventListener("submit", async (e) => {
        e.preventDefault();
        const p1 = $("#rp-pass");
        const p2 = $("#rp-pass2");
        const f1 = p1.closest(".field");
        const f2 = p2.closest(".field");
        f1.classList.toggle("invalid", p1.value.length < 6);
        f2.classList.toggle("invalid", p2.value !== p1.value || !p2.value);
        if (p1.value.length < 6 || p2.value !== p1.value) return;

        const btn = e.submitter;
        setBtnLoading(btn, true, "Salvando...");
        try {
          await Auth.updatePassword(p1.value);
          Toast.success("Senha atualizada!", "Redirecionando para o login...");
          setTimeout(() => location.replace("login.html"), 900);
        } catch (err) {
          setBtnLoading(btn, false);
          Toast.error("Não foi possível redefinir", err.message);
        }
      });

      document.querySelectorAll("input").forEach((i) =>
        i.addEventListener("input", () => i.closest(".field").classList.remove("invalid"))
      );
    </script>
  </body>
</html>
